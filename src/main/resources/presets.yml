# ═══════════════════════════════════════════════════════════
# MobGrab 2.0 — Mob Presets
#
# Create custom mob items:  /mobgrab give <player> <preset>
# Save existing mobs:       /mobgrab save <name>
# List all presets:          /mobgrab list
# Delete a preset:           /mobgrab delete <name>
#
# Item format:  MATERIAL:AMOUNT  (e.g. EMERALD:10)
# Enchantment keys: minecraft names (mending, unbreaking, etc.)
# ═══════════════════════════════════════════════════════════

# ── Librarians ────────────────────────────────────────────

mending_librarian:
  type: VILLAGER
  name: "&6Mending Master"
  profession: LIBRARIAN
  level: 5
  trades:
    - ingredient1: "EMERALD:5"
      ingredient2: "BOOK:1"
      result: "ENCHANTED_BOOK:1"
      enchantments:
        mending: 1
      max-uses: 9999
