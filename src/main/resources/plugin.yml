name: MobGrab
version: '1.4.0'
main: com.mobgrab.MobGrab
api-version: '1.21'
description: Pick up mobs as items and place them back down
author: Con
website: https://nomonom.net
softdepend:
  - floodgate
  - WorldGuard
  - PlotSquared
  - GriefPrevention
  - RoseStacker
commands:
  mobgrab:
    description: MobGrab admin commands
    usage: /mobgrab <gui|reload|update>

permissions:
  # ════════════════════════════════════════════════════════════════════
  #  Bundle Permissions (grant groups of mobs at once)
  # ════════════════════════════════════════════════════════════════════

  mobgrab.pickup.*:
    description: Pick up all enabled mobs (includes all bundles)
    default: false
    children:
      mobgrab.pickup.passive: true
      mobgrab.pickup.hostile: true
      mobgrab.pickup.villager: true
      mobgrab.pickup.utility: true
      mobgrab.pickup.boss: true

  mobgrab.pickup.passive:
    description: Pick up passive mobs (cows, sheep, chickens, etc.)
    default: false
