      mobgrab.pickup.zombified_piglin: true
      mobgrab.pickup.creaking: true

  # Granting this also grants zombie_villager pickup
  mobgrab.pickup.villager:
    description: Pick up villagers and zombie villagers
    default: false
    children:
      mobgrab.pickup.zombie_villager: true

  mobgrab.pickup.utility:
    description: Pick up utility mobs (iron golems, snow golems, copper golems)
    default: false
    children:
      mobgrab.pickup.iron_golem: true
      mobgrab.pickup.snow_golem: true
      mobgrab.pickup.copper_golem: true

  mobgrab.pickup.boss:
    description: Pick up boss mobs (warden, wither, ender dragon)
    default: false
    children:
      mobgrab.pickup.warden: true
      mobgrab.pickup.wither: true
      mobgrab.pickup.ender_dragon: true

